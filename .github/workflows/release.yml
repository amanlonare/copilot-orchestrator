name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest
    name: "Bump version and create changelog"
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog_increment_filename: CHANGELOG.md
          push: false
          commit: false

      - name: Sync uv lockfile and Push
        run: |
          uv lock
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # The commitizen action already modified pyproject.toml and CHANGELOG.md
          # uv lock modified uv.lock. We commit them all now.
          git commit -m "bump: version update [skip ci]" || echo "No changes"
          git push origin main --tags
