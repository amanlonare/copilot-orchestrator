name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest
    name: "Bump version and create changelog"
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          pip install commitizen

      - name: Bump version and Push
        run: |
          # Configure Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Perform the Bump (updates pyproject.toml and CHANGELOG.md)
          # We use --no-raise 21 to avoid failing if no bump is needed
          cz bump --yes --changelog --no-raise 21

          # Sync uv lock
          uv lock

          # Finalize and Push
          git add .
          # Capturing version for the commit message
          NEW_VERSION=$(cz version --project)
          git commit -m "bump: version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main --tags
